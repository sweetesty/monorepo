name: Kani Formal Verification

on:
  push:
    branches: [main]
    paths:
      - "contracts/staking_pool/**"
      - "contracts/Makefile"
      - ".github/workflows/kani.yml"
  schedule:
    # Weekly verification — Sunday 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  kani-staking-pool:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        run: rustup install nightly

      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup

      - name: Run staking_pool proofs
        run: make kani-staking-pool
